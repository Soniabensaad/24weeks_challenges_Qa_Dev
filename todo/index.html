
      <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do List</title>
  <link rel="stylesheet" href="styles.css">

  <!-- La documentation pour cette librairie peut être trouvée ici: https://getbootstrap.com/docs/5.3/forms/overview/ -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>

  <h1>To-do List</h1>

  <div class="container">
    <input
      type="text"
      id="inputTask"
      placeholder="Add a task please..."
    >

    <!-- type="button" évite un comportement inattendu si un formulaire est ajouté -->
    <!-- onclick permet d'appeler directement une fonction -->
    <button type="button" onclick="addTask()">Add</button>
  </div>

  <ul id="myList">
    <!-- L'élément est caché uniquement grâce à son id -->
    <li id="temporary_listElement_id">
      <input type="checkbox" id="temporary_id">
      <label for="temporary_id">Item label</label>
    </li>
  </ul>

  <script src="script.js"></script>

</body>
